name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject site secrets into runtime config
        run: node scripts/write-site-config-local.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          SITE_URL: ${{ secrets.SITE_URL }}

      - name: Verify runtime config for deploy
        run: |
          test -f js/runtime-config.json
          node -e "const c=require('./js/runtime-config.json'); if(!c.supabaseUrl||!c.supabaseAnonKey){console.error('Missing Supabase keys in runtime-config.json'); process.exit(1)}"

      - name: Stamp asset cache busters
        run: node scripts/stamp-assets.mjs ${{ github.sha }}

      - name: Prepare Pages artifact
        run: |
          rm -rf _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '_site' \
            --exclude '.env.local' \
            . _site/
          test -f _site/js/runtime-config.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
