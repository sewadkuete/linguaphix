name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject site secrets into runtime config
        run: node scripts/write-site-config-local.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          SITE_URL: ${{ secrets.SITE_URL }}
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}

      - name: Verify runtime config for deploy
        run: |
          test -f js/supabase-config.json
          node -e "const c=require('./js/supabase-config.json'); if(!c.supabaseUrl||!c.supabaseAnonKey){console.error('Missing Supabase keys in supabase-config.json'); process.exit(1)} if(!c.turnstileSiteKey){console.log('::warning::turnstileSiteKey missing — add repository secret TURNSTILE_SITE_KEY (Settings → Secrets → Actions)')}"

      - name: Normalize SEO tags and sitemap
        run: node scripts/ensure-seo-tags.mjs && node scripts/generate-sitemap.mjs

      - name: Stamp asset cache busters
        run: node scripts/stamp-assets.mjs ${{ github.sha }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # NOTE: the deployed artifact is already stamped in the runner above, so
      # the live site always carries the correct build id. We intentionally do
      # NOT commit the stamped assets back to the repo: that second push used to
      # re-trigger a redundant "pages build and deployment" run right after this
      # one, and the two racing deployments would occasionally leave a failed
      # (red) deployment. One push = one deployment now.
